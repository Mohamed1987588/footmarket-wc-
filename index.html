<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footmarket | Sélections Coupe du Monde</title>
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse pour lire les CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Police Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="text-slate-900 antialiased">

    <!-- BARRE DE NAVIGATION -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-xl font-black tracking-wider text-slate-950">FOOT<span class="text-emerald-600">MARKET</span></span>
                    <span class="ml-2 bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded-full">WC 2026</span>
                </div>
                <div class="flex-1 max-w-md mx-8">
                    <div class="relative">
                        <input type="text" id="searchInput" oninput="filtrerJoueurs()" placeholder="Rechercher un joueur, un club..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-5 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                        <div class="absolute left-3 top-2.5 text-slate-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- SECTION PRINCIPALE -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8 bg-slate-950 text-white rounded-2xl p-8 md:p-12 relative overflow-hidden shadow-md">
            <div class="relative z-10 max-w-lg">
                <span class="text-xs font-bold uppercase tracking-widest text-emerald-400">Valeurs Marchandes</span>
                <h1 class="text-3xl md:text-4xl font-black mt-2 mb-4 leading-tight">Les Équipes de la Coupe du Monde</h1>
                <p class="text-slate-400 text-sm">Explorez les effectifs des 48 nations, analysez les stats et comparez les valeurs marchandes des joueurs sélectionnés.</p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- FILTRES LATERAUX -->
            <aside class="w-full lg:w-64 flex-shrink-0">
                <div class="bg-white p-6 rounded-xl border border-slate-100 sticky top-24 shadow-sm">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Filtrer par Pays</h2>
                    <div class="space-y-1 mb-6 max-h-60 overflow-y-auto pr-2" id="paysFilters"></div>

                    <hr class="my-4 border-slate-100">

                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Poste</h2>
                    <div class="space-y-1" id="posteFilters"></div>
                </div>
            </aside>

            <!-- GRILLE DES JOUEURS -->
            <section class="flex-1">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-sm text-slate-500"><span id="joueurCount" class="font-bold text-slate-950">0</span> joueurs trouvés</p>
                    <select id="sortSelect" onchange="filtrerJoueurs()" class="bg-transparent text-sm font-semibold text-slate-700 focus:outline-none cursor-pointer">
                        <option value="valeurDesc">Valeur : Élevée à Faible</option>
                        <option value="valeurAsc">Valeur : Faible à Élevée</option>
                        <option value="nom">Nom (A-Z)</option>
                    </select>
                </div>

                <div id="joueursGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-12 text-slate-400 text-sm">Extraction des joueurs en cours...</div>
                </div>
            </section>
        </div>
    </main>

    <!-- LOGIQUE JAVASCRIPT AVANCÉE -->
    <script>
        let tousLesJoueurs = [];
        let paysSelectionne = 'Tous';
        let posteSelectionne = 'Tous';

        // Vos 48 fichiers exacts
        const fichiersPays = [
            "mexique", "afrique_du_sud", "coree_du_sud", "tchequie",
            "canada", "bosnie_herzegovine", "qatar", "suisse",
            "bresil", "maroc", "haiti", "ecosse",
            "etats_unis", "paraguay", "australie", "turquie",
            "allemagne", "Curaçao", "Cote_divoire", "equateur",
            "pays_bas", "japon", "suede", "tunisie",
            "belgique", "egypte", "iran", "nouvelle_zelande",
            "espagne", "cap_vert", "arabie_saoudite", "uruguay",
            "france", "senegal", "irak", "norvege",
            "argentine", "algerie", "autriche", "jordanie",
            "portugal", "rd_congo", "ouzbekistan", "colombie",
            "angleterre", "croatie", "ghana", "panama"
        ];

        document.addEventListener("DOMContentLoaded", () => {
            chargerTousLesFichiersCSV();
        });

        // Fonction pour convertir les textes (ex: "1,6 M €") en vrais nombres pour pouvoir trier
        function parserValeur(valStr) {
            if (!valStr || typeof valStr !== 'string') return 0;
            let cleanStr = valStr.replace(/[\s\xa0€]/g, '').trim(); 
            if (cleanStr === '' || cleanStr === '-') return 0;
            
            let multiplier = 1;
            if (cleanStr.toUpperCase().includes('K')) {
                multiplier = 1000;
                cleanStr = cleanStr.replace(/K/ig, '');
            } else if (cleanStr.toUpperCase().includes('M')) {
                multiplier = 1000000;
                cleanStr = cleanStr.replace(/M/ig, '');
            }
            
            cleanStr = cleanStr.replace(',', '.');
            let num = parseFloat(cleanStr);
            return isNaN(num) ? 0 : num * multiplier;
        }

        async function chargerTousLesFichiersCSV() {
            try {
                const listePromises = fichiersPays.map(nomFichier => {
                    return new Promise((resolve) => {
                        Papa.parse(`${nomFichier}.csv`, {
                            download: true,
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                let records = [];
                                let currentStats = null;
                                
                                // Transforme "afrique_du_sud" en "Afrique Du Sud" pour l'affichage
                                let paysFormatter = nomFichier.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

                                for (let row of results.data) {
                                    let keys = Object.keys(row);
                                    if (keys.length < 2) continue; // Sécurité
                                    
                                    // Détection dynamique des colonnes
                                    let firstKey = keys[0]; 
                                    let posKey = keys.find(k => k.includes('Position')) || keys[1];
                                    let clubKey = keys.find(k => k.includes('Club')) || keys[2];
                                    let numKey = keys.find(k => k.includes('Num')) || keys[3];
                                    let ageKey = keys.find(k => k.includes('ge')) || keys[4];
                                    let valKey = keys.find(k => k.includes('Valeur')) || keys[6];

                                    let nameCol = row[firstKey];
                                    let position = row[posKey];

                                    // Étape 1 : Si on détecte une position, on sauvegarde les stats
                                    if (position && String(position).trim() !== '') {
                                        currentStats = {
                                            Poste: position,
                                            Club: row[clubKey] || '-',
                                            SelectionNumero: row[numKey] || '?',
                                            Age: row[ageKey] || '?',
                                            ValeurText: row[valKey] || '-',
                                            ValeurNum: parserValeur(row[valKey])
                                        };
                                    // Étape 2 : Si on a les stats et qu'on trouve un nom sur la ligne suivante
                                    } else if (nameCol && String(nameCol).trim() !== '') {
                                        if (currentStats) {
                                            let nomAffiche = String(nameCol).trim();
                                            // Nettoyage des textes parasites (comme les blessures) attachés aux noms
                                            nomAffiche = nomAffiche.replace(/(Blessure|Suspendu|Carton).*/i, '').trim();

                                            records.push({
                                                Nom: nomAffiche,
                                                Pays: paysFormatter,
                                                Poste: currentStats.Poste,
                                                Club: currentStats.Club,
                                                Age: currentStats.Age,
                                                SelectionNumero: currentStats.SelectionNumero,
                                                ValeurText: (currentStats.ValeurText === '-' || !currentStats.ValeurText) ? 'N/A' : currentStats.ValeurText,
                                                ValeurNum: currentStats.ValeurNum
                                            });
                                            currentStats = null; // On remet à zéro pour le prochain joueur
                                        }
                                    }
                                }
                                resolve(records);
                            },
                            error: () => resolve([])
                        });
                    });
                });

                const résultatsParPays = await Promise.all(listePromises);
                tousLesJoueurs = résultatsParPays.flat().filter(j => j && j.Nom);

                genererFiltresPays();
                genererFiltresPostes();
                filtrerJoueurs();
            } catch (error) {
                console.error("Erreur de chargement :", error);
            }
        }

        function genererFiltresPays() {
            const pays = ['Tous', ...new Set(tousLesJoueurs.map(j => j.Pays))].sort();
            const conteneur = document.getElementById('paysFilters');
            conteneur.innerHTML = '';
            pays.forEach(p => {
                const b = document.createElement('button');
                b.textContent = p;
                b.className = `w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all ${paysSelectionne === p ? 'bg-emerald-600 text-white font-semibold' : 'text-slate-600 hover:bg-slate-100'}`;
                b.onclick = () => { paysSelectionne = p; genererFiltresPays(); filtrerJoueurs(); };
                conteneur.appendChild(b);
            });
        }

        function genererFiltresPostes() {
            const postes = ['Tous', ...new Set(tousLesJoueurs.map(j => j.Poste))];
            const conteneur = document.getElementById('posteFilters');
            conteneur.innerHTML = '';
            postes.forEach(post => {
                const b = document.createElement('button');
                b.textContent = post;
                b.className = `w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all ${posteSelectionne === post ? 'bg-emerald-600 text-white font-semibold' : 'text-slate-600 hover:bg-slate-100'}`;
                b.onclick = () => { posteSelectionne = post; genererFiltresPostes(); filtrerJoueurs(); };
                conteneur.appendChild(b);
            });
        }

        function afficherJoueurs(liste) {
            const grid = document.getElementById('joueursGrid');
            document.getElementById('joueurCount').textContent = liste.length;
            grid.innerHTML = '';

            if(liste.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">Aucun joueur ne correspond aux filtres.</div>`;
                return;
            }

            liste.forEach(joueur => {
                const carte = document.createElement('div');
                carte.className = "bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 relative group";
                carte.innerHTML = `
                    <div class="absolute top-3 right-3 bg-slate-100 text-slate-700 font-bold text-xs w-7 h-7 rounded-full flex items-center justify-center z-10 shadow-sm">
                        N°${joueur.SelectionNumero}
                    </div>
                    <div class="p-5">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-emerald-50 border border-emerald-100 flex-shrink-0 flex items-center justify-center font-bold text-emerald-600 text-lg">
                                ${joueur.Nom ? joueur.Nom.charAt(0) : '?'}
                            </div>
                            <div>
                                <span class="text-[10px] font-extrabold uppercase tracking-widest text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">${joueur.Poste}</span>
                                <h3 class="font-bold text-base text-slate-900 mt-0.5 leading-tight group-hover:text-emerald-600 transition-colors">${joueur.Nom}</h3>
                                <p class="text-xs text-slate-500 font-medium">${joueur.Pays} • ${joueur.Age} ans</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center text-xs">
                            <div>
                                <p class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">Club</p>
                                <p class="font-semibold text-slate-700">${joueur.Club}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">Valeur Marchande</p>
                                <p class="font-extrabold text-slate-950 text-sm">${joueur.ValeurText}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(carte);
            });
        }

        function filtrerJoueurs() {
            const recherche = document.getElementById('searchInput').value.toLowerCase();
            const tri = document.getElementById('sortSelect').value;
            
            let resultats = tousLesJoueurs.filter(j => {
                const matchPays = (paysSelectionne === 'Tous' || j.Pays === paysSelectionne);
                const matchPoste = (posteSelectionne === 'Tous' || j.Poste === posteSelectionne);
                const matchTexte = (j.Nom && j.Nom.toLowerCase().includes(recherche)) || (j.Club && j.Club.toLowerCase().includes(recherche));
                return matchPays && matchPoste && matchTexte;
            });

            if (tri === "valeurDesc") resultats.sort((a, b) => b.ValeurNum - a.ValeurNum);
            if (tri === "valeurAsc") resultats.sort((a, b) => a.ValeurNum - b.ValeurNum);
            if (tri === "nom") resultats.sort((a, b) => (a.Nom || "").localeCompare(b.Nom || ""));

            afficherJoueurs(resultats);
        }
    </script>
</body>
</html>
